<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎁 Секретная пасхалка | CMR</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/static/corporate_reddit.css">
    <style>
        /* Дополнительные стили для пасхалки */
        .easter-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .easter-card {
            max-width: 900px;
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 2rem;
            animation: fadeInUp 0.5s ease-out;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .easter-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .easter-icon {
            font-size: 4rem;
            color: var(--accent);
            animation: bounce 1s ease infinite;
            display: inline-block;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .easter-title {
            font-size: 2rem;
            font-weight: 700;
            margin: 1rem 0 0.5rem;
            background: linear-gradient(135deg, #fff, var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .easter-subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 aspect ratio */
            margin: 1.5rem 0;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .video-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        /* Стили для видео-плеера */
        .custom-video-player {
            position: relative;
            width: 100%;
            margin: 1.5rem 0;
            border-radius: 20px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .custom-video-player video {
            width: 100%;
            display: block;
        }
        
        .video-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .custom-video-player:hover .video-controls {
            opacity: 1;
        }
        
        .play-btn {
            background: var(--accent);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .play-btn:hover {
            transform: scale(1.1);
        }
        
        .progress-bar {
            flex: 1;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }
        
        .progress-filled {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            width: 0%;
            transition: width 0.1s linear;
        }
        
        .time-display {
            color: white;
            font-size: 0.8rem;
            font-family: monospace;
        }
        
        .volume-control {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .volume-slider {
            width: 80px;
            height: 4px;
            cursor: pointer;
        }
        
        .fullscreen-btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 1.2rem;
        }
        
        .info-box {
            background: var(--accent-bg);
            border-left: 3px solid var(--accent);
            padding: 1rem;
            border-radius: 12px;
            margin: 1rem 0;
        }
        
        .info-box i {
            color: var(--accent);
            margin-right: 0.5rem;
        }
        
        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--bg-input);
            color: var(--text-main);
            padding: 0.75rem 1.5rem;
            border-radius: 40px;
            text-decoration: none;
            margin-top: 1.5rem;
            transition: all 0.2s;
        }
        
        .back-button:hover {
            background: var(--accent);
            color: #0a0c10;
        }
        
        /* Секретный код (комбинация клавиш) */
        .secret-hint {
            text-align: center;
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            font-size: 0.7rem;
            color: var(--text-secondary);
            opacity: 0.5;
        }
        
        .secret-hint:hover {
            opacity: 1;
        }
        
        @media (max-width: 640px) {
            .easter-card {
                padding: 1.5rem;
            }
            
            .easter-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="easter-container">
        <div class="easter-card">
            <div class="easter-header">
                <div class="easter-icon">
                    <i class="fas fa-gift"></i>
                </div>
                <h1 class="easter-title">Секретная пасхалка! 🎁</h1>
                <p class="easter-subtitle">
                    <i class="fas fa-video"></i> "Эльмир крадёт монитор"
                </p>
            </div>
            
            <!-- Вариант 1: Простое встраивание видео -->
            <div class="video-container">
                <video id="instructionVideo" controls poster="https://via.placeholder.com/1280x720/1a1c23/f59e0b?text=CMR+Video+Instruction">
                    <source src="/static/Monitor.mp4" type="video/mp4">
                    <!-- Запасной вариант: YouTube видео (если нет своего видео) -->
                    <!-- <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4"> -->
                    <!-- Ваш браузер не поддерживает видео. -->
                </video>
            </div>
            
            <!-- Информационный блок -->
            <div class="info-box">
                <i class="fas fa-info-circle"></i>
                <strong>Смотрите внимательно</strong>
                <ul style="margin-top: 0.5rem; margin-left: 1.5rem; color: var(--text-secondary);">
                </ul>
            </div>
            
            <!-- Альтернативный вариант: встроенный YouTube (если нужно) -->
            <!--
            <div class="video-container">
                <iframe 
                    width="100%" 
                    height="100%" 
                    src="https://www.youtube.com/embed/ВАШ_ID_ВИДЕО" 
                    frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
                </iframe>
            </div>
            -->
            
            <!-- Кнопка возврата -->
            <div style="text-align: center;">
                <a href="/" class="back-button">
                    <i class="fas fa-arrow-left"></i> Вернуться в CMR
                </a>
            </div>
            
            <!-- Секретный намёк -->
            <div class="secret-hint">
                <i class="fas fa-keyboard"></i> PS: F5 для конфети...
            </div>
        </div>
    </div>
    
    <script>
        // Дополнительная пасхалка - консольное сообщение
        console.log("%c🎉 ПОЗДРАВЛЯЮ! 🎉", "color: #f59e0b; font-size: 20px; font-weight: bold;");
        console.log("%cВы нашли секретную пасхалку в CMR!", "color: #10b981; font-size: 14px;");
        console.log("%cРазработчики: Морозов, Бабенко, Волков (DOK)", "color: #3b82f6; font-size: 12px;");
        console.log("%cДокументация: http://wiki.cmr.local", "color: #9aa0a8; font-size: 12px;");
        
        // Эффект конфетти при загрузке (опционально)
        function showConfetti() {
            const colors = ['#f59e0b', '#10b981', '#3b82f6', '#ef4444', '#8b5cf6'];
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.style.position = 'fixed';
                confetti.style.width = '10px';
                confetti.style.height = '10px';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.top = '-10px';
                confetti.style.borderRadius = '50%';
                confetti.style.pointerEvents = 'none';
                confetti.style.zIndex = '9999';
                confetti.style.animation = `fall ${Math.random() * 2 + 2}s linear forwards`;
                document.body.appendChild(confetti);
                
                setTimeout(() => confetti.remove(), 4000);
            }
        }
        
        // Добавляем анимацию падения конфетти
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fall {
                to {
                    transform: translateY(100vh) rotate(360deg);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
        
        // Показываем конфетти через 1 секунду после загрузки
        setTimeout(showConfetti, 500);
        
        // Секретная комбинация клавиш для дополнительной пасхалки
        let konamiCode = [];
        const secretCode = ['ArrowUp', 'ArrowUp', 'ArrowDown', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'ArrowLeft', 'ArrowRight', 'KeyB', 'KeyA'];
        
        document.addEventListener('keydown', (e) => {
            konamiCode.push(e.code);
            if (konamiCode.length > secretCode.length) {
                konamiCode.shift();
            }
            
            if (JSON.stringify(konamiCode) === JSON.stringify(secretCode)) {
                alert('🎮 СЕКРЕТНЫЙ КОД АКТИВИРОВАН! 🎮\n\nДобро пожаловать в клуб избранных!');
                document.body.style.animation = 'rainbow 1s';
                showConfetti();
                
                // Меняем цвета на радужные
                const root = document.documentElement;
                const colors = ['#ff0000', '#ff7f00', '#ffff00', '#00ff00', '#0000ff', '#4b0082', '#9400d3'];
                let i = 0;
                const rainbowInterval = setInterval(() => {
                    root.style.setProperty('--accent', colors[i % colors.length]);
                    i++;
                    if (i > colors.length * 2) clearInterval(rainbowInterval);
                }, 200);
            }
        });
        
        // Дополнительно: автозапуск видео при наведении (если нужно)
        // const video = document.getElementById('instructionVideo');
        // if (video) {
        //     video.addEventListener('mouseenter', () => video.play());
        //     video.addEventListener('mouseleave', () => video.pause());
        // }
    </script>
</body>
</html>
