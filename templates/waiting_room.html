<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ожидание подтверждения | DMS</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='fontawesome/css/all.min.css') }}">
    <style>
        body {
            background-color: #0a0c10;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .waiting-card {
            max-width: 600px;
            padding: 2rem;
            background: #FF8C00	;
            border: 1px solid #2a2c31;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .animate-pulse-slow {
            animation: pulse-yellow 3s infinite;
        }
        @keyframes pulse-yellow {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }
        .f5-badge {
            background: rgba(255, 255, 255, 0.05);
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-family: monospace;
        }
    </style>
</head>
<body class="text-white text-center">
    <div class="waiting-card">
        <div class="mb-4">
            <i class="fas fa-user-shield fa-5x text-warning animate-pulse-slow"></i>
        </div>
        
        <h1 class="fw-bold mb-3">Здравствуйте, {{ user_name }}!</h1>
        <p class="lead text-secondary">Ваш аккаунт успешно зарегистрирован в системе <strong>DMS</strong>.</p>
        
        <div class="alert alert-info bg-dark border-info text-info d-inline-block shadow-sm my-3 py-2 px-4">
            <i class="fas fa-info-circle me-2"></i> 
            Ваш доступ ожидает подтверждения администратором <br>
            <strong class="ms-4"><i class="fas fa-phone-alt small"></i> 96-62-20</strong>
        </div>
        
        <p class="text-muted small mt-2">
            После подтверждения функционал станет доступен автоматически.<br>
            Просто обновите страницу <span class="f5-badge text-white">F5</span>
        </p>
        
        <div class="mt-4 pt-3 border-top border-secondary opacity-50">
            <a href="/logout" class="btn btn-outline-light btn-sm px-4 rounded-pill">
                <i class="fas fa-sign-out-alt me-2"></i>Выйти из аккаунта
            </a>
        </div>
    </div>
</body>
</html>
