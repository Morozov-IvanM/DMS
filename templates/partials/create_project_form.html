<div class="card create-card">
	<div class="card-header">
		<i class="fas fa-plus-circle"></i> Новый проект
	</div>
	<div class="card-body">
		<!-- Убрали класс create-form, убрали перехват AJAX -->
		<form action="/create_project" method="post">
			<div class="form-row">
				<div class="form-group flex-2">
					<label for="project-name">Название проекта</label>
					<div class="input-wrapper">
						<i class="fas fa-tag input-icon"></i>
						<input type="text" id="project-name" name="name" placeholder="Например: Внедрение CRM" required>
					</div>
				</div>
				<div class="form-group flex-3">
					<label for="project-desc">Краткое описание</label>
					<div class="input-wrapper">
						<i class="fas fa-align-left input-icon"></i>
						<input type="text" id="project-desc" name="description" placeholder="Что нужно сделать? (необязательно)">
					</div>
				</div>
				<div class="form-group flex-1">
					<label>&nbsp;</label>
					<button type="submit" class="btn btn-primary">
						<i class="fas fa-rocket"></i> Создать
					</button>
				</div>
			</div>
		</form>
	</div>
</div>
