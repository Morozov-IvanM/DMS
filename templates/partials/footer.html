<div class="container text-center mt-5 mb-4">
    <div class="card-footer" style="flex-direction: column; gap: 5px;">
        <div class="text-muted small">
            <i class="fas fa-shield-alt"></i>
            <span>&copy; 2026 Морозов & Бабенко & Волков (DOK). Безопасный регион.</span>
        </div>
        <div class="text-muted" style="font-size: 0.8rem; opacity: 0.8;">
            <i class="fas fa-phone-alt"></i>
            <span>По вопросам работоспособности: 96-62-20</span>
        </div>
    </div>
    
    <!-- Кнопка смены пароля (теперь аккуратно внизу) -->
    <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#passwordModal">
		Сменить пароль
	</button>
</div>
<!-- Модальное окно (оно всегда скрыто, пока не нажата кнопка) -->
<div class="modal fade" id="passwordModal" tabindex="-1" aria-hidden="true" style="display: none;">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-light">
                <h5 class="modal-title" id="passwordModalLabel"><i class="fas fa-shield-alt me-2"></i>Безопасность аккаунта</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
            </div>
            <form action="/change-password" method="post">
                <div class="modal-body text-start">
                    <p class="text-muted small">Введите старый и новый пароли для обновления доступа.</p>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Старый пароль</label>
                        <input type="password" name="old_password" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Новый пароль</label>
                        <input type="password" name="new_password" class="form-control" minlength="6" required>
                    </div>
                </div>
                <div class="modal-footer bg-light">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Отмена</button>
                    <button type="submit" class="btn btn-primary btn-sm">Сохранить изменения</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% if user_name == "Администратор" %}
<div class="mt-3">
    <!-- Кнопка теперь открывает модалку для ввода пароля -->
    <button type="button" class="btn btn-dark btn-sm shadow-sm" data-bs-toggle="modal" data-bs-target="#adminAuthModal">
        <i class="fas fa-user-shield me-1"></i> Войти в админку
    </button>
</div>

<!-- Модалка входа в админку -->
<div class="modal fade" id="adminAuthModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-sm modal-dialog-centered">
        <div class="modal-content">
            <form action="/admin/panel" method="post">
                <div class="modal-body text-start">
                    <label class="form-label small fw-bold">Пароль администратора</label>
                    <input type="password" name="admin_password" class="form-control form-control-sm" required>
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn btn-danger btn-sm w-100">Подтвердить вход</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endif %}
