<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMR — Лента проектов</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/bootstrap.min.css') }}">
	<link rel="stylesheet" href="{{ url_for('static', path='css/corporate_reddit.css') }}">
</head>
<body>													<!-- Хедер -->
    <header class="header">
    {% include 'partials/header.html' %}    
    </header>
																<!-- Глобальный чат -->
	{% include 'partials/chat.html' %}
		
    <div class="page-container">
        <!-- Форма создания проекта -->
		{% include 'partials/create_project_form.html' %}
        <!-- Основной контент: две колонки -->
        <div class="two-columns">
			<div class="left-column">
            <!-- Левая колонка: список проектов -->
            {% include 'partials/projects_list.html' %}
			</div>
            <!-- Правая колонка: последние комментарии -->
            <div class="right-column">
			{% include 'partials/recent_comments.html' %}
			</div>
        </div>

        <!-- Футер -->
    {% include 'partials/footer.html' %}
    </div>
	
<script src="{{ url_for('static', path='js/bootstrap.bundle.min.js') }}"></script>

<!-- 2. Файл со всей логикой чата -->
<script src="{{ url_for('static', path='js/chat.js') }}"></script>

<!-- 3. Инициализация (запуск) -->
<script>
    initChat({
        // Достаем ID первого сообщения из списка для начала отсчета новых
        initialLastMsgId: parseInt("{{ chat_messages[0][0] if chat_messages else 0 }}") || 0,
        userName: "{{ user_name }}",
        userList: {{ user_list | tojson if user_list else [] }}
    });
</script>
</body>
</html>
