<!-- 1. Библиотека Bootstrap -->
<script src="{{ url_for('static', path='js/bootstrap.bundle.min.js') }}"></script>

<!-- 2. Файл с логикой чата -->
<script src="{{ url_for('static', path='js/chat.js') }}"></script>

<!-- 3. Инициализация чата -->
{% if chat_messages is defined %}
<script>
    // Проверка лимита файла перед отправкой в чате
    document.addEventListener('change', function(e) {
        if (e.target && e.target.id === 'chat-file') {
            const file = e.target.files[0];
            const maxSize = 50 * 1024 * 1024; // 50 MB
            if (file && file.size > maxSize) {
                alert("Файл слишком большой! Максимальный размер — 50 МБ.Прикрепление отменено");
                e.target.value = ""; // Очищаем выбор
            }
        }
    });

    initChat({
        initialLastMsgId: parseInt("{{ chat_messages[0][0] if chat_messages else 0 }}") || 0,
        userName: "{{ user_name }}",
        userList: {{ user_list | tojson if user_list else [] }}
    });
</script>
{% endif %}

<script>
document.addEventListener('DOMContentLoaded', function() {
    const trigger = document.getElementById('triggerContainer');
    const formContainer = document.getElementById('projectFormContainer');
    const showBtn = document.getElementById('showFormBtn');
    const hideBtn = document.getElementById('closeFormBtn');
    const hideCross = document.getElementById('closeFormCross');

    if (showBtn && formContainer && trigger) {
        showBtn.addEventListener('click', () => {
            formContainer.style.display = 'block';
            trigger.style.display = 'none';
        });

        const hideForm = () => {
            formContainer.style.display = 'none';
            trigger.style.display = 'block';
            // Очищаем поля формы при закрытии, чтобы не отправить случайно
            const form = formContainer.querySelector('form');
            if (form) form.reset();
        };

        if (hideBtn) hideBtn.addEventListener('click', hideForm);
        if (hideCross) hideCross.addEventListener('click', hideForm);
    }
});

window.toggleFavorite = function(projectId, btn) {
		fetch(`/api/projects/${projectId}/favorite`, { method: 'POST' })
		.then(res => res.json())
		.then(data => {
			if (data.success) {
				const icon = btn.querySelector('i');
				const favContainer = document.getElementById('favorites-container');
				
				if (data.status === 'added') {
					// 1. Красим звезду
					btn.classList.add('active');
					icon.classList.replace('far', 'fas');
					
					// 2. Добавляем в список справа (создаем элемент на лету)
					// Находим название проекта в текущей карточке
					const projectName = btn.closest('.position-relative').querySelector('.project-grid-title').innerText;
					
					const newItem = document.createElement('a');
					newItem.href = `/project/${projectId}`;
					newItem.className = 'fav-item-link';
					newItem.id = `fav-side-${projectId}`;
					newItem.innerHTML = `
						<i class="fas fa-folder text-primary me-2"></i>
						<span class="text-truncate">${projectName}</span>
						<i class="fas fa-chevron-right ms-auto small opacity-50"></i>
					`;
					
					// Если была заглушка "Здесь пока пусто", удаляем её
					if (favContainer.querySelector('.text-center')) {
						favContainer.innerHTML = '';
					}
					favContainer.appendChild(newItem);
					
				} else {
					// 1. Гасим звезду
					btn.classList.remove('active');
					icon.classList.replace('fas', 'far');
					
					// 2. Удаляем из списка справа
					const itemToRemove = document.getElementById(`fav-side-${projectId}`);
					if (itemToRemove) itemToRemove.remove();
					
					// Если список стал пустым, возвращаем заглушку
					if (favContainer.children.length === 0) {
						favContainer.innerHTML = `
							<div class="text-center py-5 text-muted small">
								<i class="fas fa-star-half-alt opacity-25 mb-2 fa-2x"></i>
								<p>Нажмите ⭐ на карточке,<br>чтобы закрепить проект</p>
							</div>`;
					}
				}
			}
		});
	};
</script>
