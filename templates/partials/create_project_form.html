<!-- Кнопка-триггер (всегда видна) -->
<div class="container mb-3 text-start">
    <button type="button" class="btn btn-success shadow-sm" id="toggleProjectForm">
        <i class="fas fa-plus-circle me-1"></i> Создать проект
    </button>
</div>

<!-- Контейнер формы (скрыт по умолчанию) -->
<div id="projectFormContainer" style="display: none;">
    <div class="card create-card mb-4 shadow-sm border-0">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <span><i class="fas fa-rocket me-2"></i> Новый проект</span>
            <button type="button" class="btn-close btn-close-white" id="closeProjectForm"></button>
        </div>
        <div class="card-body">
            <form action="/create_project" method="post">
                <div class="form-row d-flex gap-3 align-items-end">
                    <div class="form-group flex-grow-1">
                        <label for="project-name" class="small fw-bold">Название проекта</label>
                        <div class="input-wrapper mt-1">
                            <i class="fas fa-tag input-icon"></i>
                            <input type="text" id="project-name" name="name" class="form-control" placeholder="Например: Внедрение CRM" required>
                        </div>
                    </div>
                    <div class="form-group flex-grow-2">
                        <label for="project-desc" class="small fw-bold">Краткое описание</label>
                        <div class="input-wrapper mt-1">
                            <i class="fas fa-align-left input-icon"></i>
                            <input type="text" id="project-desc" name="description" class="form-control" placeholder="Что нужно сделать?">
                        </div>
                    </div>
                    <div class="form-group">
                        <button type="submit" class="btn btn-primary px-4">
                            Создать
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
